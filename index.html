<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Board</title>

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: white;
}

#board {
    width: 100%;
    height: calc(100% - 90px);
    border: none;
}
#bottom-bar {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    color: black;
    padding: 0 40px;
    box-sizing: border-box;
    border-top: 2px solid #cccccc;
}
#clock {
    font-size: 45px;
    font-weight: bold;
}
#weather {
    display: flex;
    align-items: center;
    gap: 12px;
    color: black;
}

.weather-title {
    font-size: 22px;
    font-weight: bold;
    margin-right: 10px;
}

.weather-card {
    text-align: center;
    min-width: 75px;
    font-size: 17px;
}

.weather-day {
    font-weight: bold;
}

.weather-icon {
    font-size: 32px;
}

.weather-temp {
    font-size: 17px;
    font-weight: bold;
}


</style>

</head>

<body>

<!-- YOUR GOOGLE SHEET GOES HERE -->
<iframe 
id="board"
src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTYkcAketxhzz_XmBlcr-16vxgi2LxcpE4soZ4TY3l8ZQsmzofbVjurv08mOZPd6rKJB3Y4evVsnNV4/pubhtml?gid=506717780&single=true">
</iframe>


<div id="bottom-bar">

    <div id="clock">
        Loading...
    </div>

    <div id="weather">
        Weather loading...
    </div>

</div>


<script>

function updateClock(){

    let now = new Date();

    let time = now.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
    });

    document.getElementById("clock").innerHTML = time;

}

updateClock();
setInterval(updateClock,1000);


async function getWeather(){

    const latitude = 40.6809;
    const longitude = -73.4707;

    const url =
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FNew_York`;

    const response = await fetch(url);
    const data = await response.json();

    let forecast = "";

    function weatherIcon(code){

        if(code === 0){
            return "☀️";
        }
        else if(code <= 3){
            return "⛅";
        }
        else if(code <= 67){
            return "🌧️";
        }
        else if(code <= 77){
            return "❄️";
        }
        else if(code <= 82){
            return "🌦️";
        }
        else{
            return "⛈️";
        }

    }


    for(let i = 0; i < data.daily.time.length; i++){

        let date = new Date(data.daily.time[i]);

        let day = date.toLocaleDateString('en-US',{
            weekday:'short'
        });

        let dayNumber = date.getDay();


        // Today + Monday-Friday only
        if(i === 0 || (dayNumber >= 1 && dayNumber <= 5)){

            let high = Math.round(
                data.daily.temperature_2m_max[i]
            );

            let low = Math.round(
                data.daily.temperature_2m_min[i]
            );


            forecast += `
<div class="weather-card">
    <div class="weather-day">${day}</div>
    <div class="weather-icon">${weatherIcon(data.daily.weathercode[i])}</div>
    <div class="weather-temp">${high}° / ${low}°</div>
</div>
`;
        }

    }


    document.getElementById("weather").innerHTML =
    `
    <div class="weather-title">
        
    </div>
    ${forecast}
    `;

}

getWeather();
setInterval(getWeather, 1800000);

</script>

</body>
</html>
