<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Board</title>

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: white;
}

#board {
    width: 100%;
    height: calc(100% - 90px);
    border: none;
}

#bottom-bar {
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    color: black;
    padding: 0 40px;
    box-sizing: border-box;
    border-top: 2px solid #cccccc;
}

#clock {
    font-size: 45px;
    font-weight: bold;
}

#weather {
    font-size: 25px;
    text-align: right;
}

</style>

</head>

<body>

<!-- YOUR GOOGLE SHEET GOES HERE -->
<iframe 
id="board"
src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTYkcAketxhzz_XmBlcr-16vxgi2LxcpE4soZ4TY3l8ZQsmzofbVjurv08mOZPd6rKJB3Y4evVsnNV4/pubhtml?gid=506717780&single=true">
</iframe>


<div id="bottom-bar">

    <div id="clock">
        Loading...
    </div>

    <div id="weather">
        Weather loading...
    </div>

</div>


<script>

function updateClock(){

    let now = new Date();

    let time = now.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
    });

    document.getElementById("clock").innerHTML = time;

}

updateClock();
setInterval(updateClock,1000);


async function getWeather(){

    const latitude = 40.6809;
    const longitude = -73.4707;

    const url = 
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America%2FNew_York`;

    const response = await fetch(url);
    const data = await response.json();

    let forecast = "";

    for(let i = 0; i < 5; i++){

        let day = new Date(data.daily.time[i])
        .toLocaleDateString('en-US', {weekday:'short'});

        let high = Math.round(data.daily.temperature_2m_max[i]);
        let low = Math.round(data.daily.temperature_2m_min[i]);

        forecast += `${day}: ${high}°/${low}° &nbsp;&nbsp; `;
    }

    document.getElementById("weather").innerHTML =
    "🌤 Massapequa Park<br>" + forecast;

}

getWeather();


</script>

</body>
</html>
