<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Board</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:white;
}

#board{
width:100%;
height:calc(100% - 180px);
border:none;
}

#bottom-bar{

height:180px;

display:flex;
justify-content:space-between;
align-items:center;

background:white;
color:black;

padding:0 55px;

box-sizing:border-box;

border-top:2px solid #d8d8d8;

}

#clock{

width:30%;

display:flex;
justify-content:center;
align-items:center;

font-size:88px;
font-weight:bold;

}

#weather{

width:68%;

display:flex;

justify-content:space-evenly;

align-items:center;

height:100%;

}

.weather-card{

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

min-width:110px;

}

.weather-day{

font-size:26px;

font-weight:bold;

margin-bottom:4px;

}

.weather-icon{

font-size:54px;

line-height:1;

}

.weather-temp{

font-size:28px;

font-weight:bold;

margin-top:4px;

}

.weather-now{

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

margin-right:20px;

}

.weather-now-label{

font-size:24px;

font-weight:bold;

}

.weather-now-icon{

font-size:58px;

line-height:1;

}

.weather-now-temp{

font-size:38px;

font-weight:bold;

}

</style>

</head>

<body>

<iframe
id="board"
src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTYkcAketxhzz_XmBlcr-16vxgi2LxcpE4soZ4TY3l8ZQsmzofbVjurv08mOZPd6rKJB3Y4evVsnNV4/pubhtml?gid=506717780&single=true">
</iframe>

<div id="bottom-bar">

<div id="clock">
Loading...
</div>

<div id="weather">
Loading weather...
</div>

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString('en-US',{

hour:'numeric',

minute:'2-digit',

second:'2-digit'

});

}

updateClock();

setInterval(updateClock,1000);

async function getWeather(){

const latitude=40.6809;
const longitude=-73.4707;

const response=await fetch(

`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York`

);

const data=await response.json();

function icon(code){

switch(code){

case 0:return "☀️";

case 1:
case 2:return "🌤️";

case 3:return "☁️";

case 45:
case 48:return "🌫️";

case 51:
case 53:
case 55:return "🌦️";

case 61:
case 63:
case 65:return "🌧️";

case 71:
case 73:
case 75:return "❄️";

case 80:
case 81:
case 82:return "🌦️";

case 95:
case 96:
case 99:return "⛈️";

default:return "❔";

}

}

let html="";

html+=`

<div class="weather-now">

<div class="weather-now-label">

CURRENT

</div>

<div class="weather-now-icon">

${icon(data.current.weather_code)}

</div>

<div class="weather-now-temp">

${Math.round(data.current.temperature_2m)}°

</div>

</div>

`;
